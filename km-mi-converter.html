<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Km ⇄ Mi Converter</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --accent: #38bdf8;
    --accent-dark: #0284c7;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --error: #f87171;
    --success: #34d399;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    color: var(--text);
    padding: 20px;
  }

  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  }

  h1 {
    font-size: 1.4rem;
    margin: 0 0 24px;
    text-align: center;
  }

  label.field-label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    font-size: 1.1rem;
    border-radius: 10px;
    border: 2px solid #334155;
    background: #0f172a;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s ease;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"].invalid {
    border-color: var(--error);
  }

  .radio-group {
    display: flex;
    gap: 12px;
    margin: 18px 0;
  }

  .radio-option {
    flex: 1;
    position: relative;
  }

  .radio-option input {
    position: absolute;
    opacity: 0;
    inset: 0;
    cursor: pointer;
  }

  .radio-option label {
    display: block;
    text-align: center;
    padding: 10px 8px;
    border-radius: 10px;
    border: 2px solid #334155;
    color: var(--muted);
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .radio-option input:checked + label {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(56, 189, 248, 0.08);
  }

  .result {
    margin-top: 20px;
    padding: 18px;
    border-radius: 12px;
    background: #0f172a;
    min-height: 68px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .result-value {
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--success);
  }

  .result-placeholder {
    color: var(--muted);
    font-size: 0.95rem;
  }

  .error-message {
    color: var(--error);
    font-size: 0.9rem;
  }

  .hint {
    margin-top: 10px;
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Kilometers ⇄ Miles Converter</h1>

  <label class="field-label" for="value-input">Enter a value</label>
  <input
    type="text"
    id="value-input"
    inputmode="decimal"
    placeholder="e.g. 5"
    autocomplete="off"
  />

  <div class="radio-group">
    <div class="radio-option">
      <input type="radio" name="direction" id="km-to-mi" value="km-to-mi" checked />
      <label for="km-to-mi">km → mi</label>
    </div>
    <div class="radio-option">
      <input type="radio" name="direction" id="mi-to-km" value="mi-to-km" />
      <label for="mi-to-km">mi → km</label>
    </div>
  </div>

  <div class="result" id="result">
    <span class="result-placeholder">Enter a number to convert</span>
  </div>

  <div class="hint">Rounded to 2 decimal places · 1 km = 0.621371 mi</div>
</div>

<script>
  const KM_TO_MI = 0.621371;
  const MI_TO_KM = 1.609344;

  const input = document.getElementById('value-input');
  const resultEl = document.getElementById('result');
  const radios = document.querySelectorAll('input[name="direction"]');

  function getDirection() {
    return document.querySelector('input[name="direction"]:checked').value;
  }

  function showPlaceholder(message) {
    resultEl.innerHTML = `<span class="result-placeholder">${message}</span>`;
    input.classList.remove('invalid');
  }

  function showError(message) {
    resultEl.innerHTML = `<span class="error-message">${message}</span>`;
    input.classList.add('invalid');
  }

  function showResult(text) {
    resultEl.innerHTML = `<span class="result-value">${text}</span>`;
    input.classList.remove('invalid');
  }

  function convert() {
    const raw = input.value.trim();

    // Guard: empty input
    if (raw === '') {
      showPlaceholder('Enter a number to convert');
      return;
    }

    // Guard: reject anything that isn't a valid plain number
    // (blocks stray text, multiple dots/signs, "5km", "1e5" edge weirdness, etc.)
    const validNumberPattern = /^-?\d*\.?\d+$/;
    if (!validNumberPattern.test(raw)) {
      showError('Please enter a valid number (digits only, e.g. 5 or 3.2)');
      return;
    }

    const value = Number(raw);

    // Guard: NaN / non-finite (extreme safety net, shouldn't hit given regex above)
    if (!Number.isFinite(value)) {
      showError('That number is not something I can convert');
      return;
    }

    // Guard: negative distances don't make physical sense here
    if (value < 0) {
      showError('Distance can\'t be negative — enter 0 or a positive number');
      return;
    }

    // Guard: absurdly large input (avoid runaway/unreadable output)
    if (value > 1e12) {
      showError('That number is too large to convert');
      return;
    }

    const direction = getDirection();
    let converted, fromUnit, toUnit;

    if (direction === 'km-to-mi') {
      converted = value * KM_TO_MI;
      fromUnit = 'km';
      toUnit = 'mi';
    } else {
      converted = value * MI_TO_KM;
      fromUnit = 'mi';
      toUnit = 'km';
    }

    const formattedInput = value % 1 === 0 ? value.toString() : value;
    showResult(`${formattedInput} ${fromUnit} = ${converted.toFixed(2)} ${toUnit}`);
  }

  input.addEventListener('input', convert);
  radios.forEach(radio => radio.addEventListener('change', convert));
</script>

</body>
</html>
